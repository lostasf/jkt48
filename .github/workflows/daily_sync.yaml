name: Daily JKT48 Sync

on:
  schedule:
    # Runs at 17:00 UTC (00:00 WIB) every day
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests psycopg2-binary python-dotenv

      - name: Run unified sync and export script
        run: python main.py
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}

      - name: Check for modified files
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changes exist
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add api/
          git commit -m "chore: daily data sync and static API update"
          git push

      - name: Discord Notification - Data Updated
        if: steps.check_changes.outputs.has_changes == 'true' && success()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "✅ **Success:** New schedule data synced and static API updated on GitHub Pages!"}' \
          ${{ secrets.DISCORD_SUCCESS_WEBHOOK }}

      - name: Discord Notification - No Changes
        if: steps.check_changes.outputs.has_changes == 'false' && success()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "ℹ️ **Info:** Sync ran successfully. No new schedule updates found."}' \
          ${{ secrets.DISCORD_SUCCESS_WEBHOOK }}

      - name: Discord Notification - Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "🚨 **ERROR:** The Daily Sync workflow failed! Check the GitHub Actions logs."}' \
          ${{ secrets.DISCORD_FAIL_WEBHOOK }}