<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theater Attendance Ranking</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            background-color: #121212;
            color: #e0e0e0;
            font-size: 18px;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 40px;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .main-title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 40px;
            color: #ffffff;
        }
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 50px;
            gap: 30px;
        }
        .podium-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .image-container {
            position: relative;
        }
        .rank-badge {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #e0e0e0;
            color: #121212;
            font-weight: bold;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 2;
            border: 3px solid #1e1e1e;
        }
        .podium-item img {
            object-fit: cover;
            border: 1px solid #444;
            background-color: #2a2a2a;
            border-radius: 6px;
            display: block;
        }
        .rank-1 { order: 2; margin-bottom: 40px; }
        .rank-2 { order: 1; }
        .rank-3 { order: 3; }
        
        .rank-1 img { width: 150px; height: 200px; }
        .rank-2 img, .rank-3 img { width: 120px; height: 160px; }
        
        .name-label {
            margin-top: 15px;
            font-size: 18px;
            font-weight: 600;
        }
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .list-item {
            display: flex;
            align-items: center;
            border: 1px solid #444;
            padding: 10px 15px;
            border-radius: 6px;
            background-color: #252525;
            font-size: 18px;
        }
        .list-rank {
            font-weight: bold;
            margin-right: 15px;
            width: 30px;
            text-align: right;
            font-size: 20px;
            color: #aaa;
        }
        .list-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            margin-right: 20px;
            border: 1px solid #555;
            border-radius: 50%;
            background-color: #2a2a2a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="main-title" class="main-title"></h1>
        <div id="podium" class="podium"></div>
        <div id="list" class="list-container"></div>
    </div>

    <script>
        function formatName(name) {
            return name.toLowerCase().replace(/ /g, '_')
        }

        function getImageUrl(name) {
            const formatted = formatName(name)
            return `img/${formatted}.jpg`
        }

        function handleImageError(e) {
            e.target.src = 'data:image/svg+xml;charset=UTF-8,%3Csvg xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 width%3D%22100%22 height%3D%22130%22 viewBox%3D%220 0 100 130%22%3E%3Crect fill%3D%22%232a2a2a%22 width%3D%22100%22 height%3D%22130%22%2F%3E%3Ctext fill%3D%22%23777%22 font-family%3D%22sans-serif%22 font-size%3D%2212%22 x%3D%2250%22 y%3D%2265%22 text-anchor%3D%22middle%22%3ENo Image%3C%2Ftext%3E%3C%2Fsvg%3E'
        }

        async function loadData() {
            const response = await fetch('data.json')
            const rawData = await response.json()
            
            const totalAttendance = rawData.total_attendance
            const data = rawData.members
            
            document.getElementById('main-title').textContent = `From ${totalAttendance} shows you've met:`
            
            const podiumContainer = document.getElementById('podium')
            const listContainer = document.getElementById('list')
            
            const topThree = data.slice(0, 3)
            const rest = data.slice(3)
            
            const podiumOrder = [1, 0, 2] 
            
            podiumOrder.forEach((index) => {
                if (topThree[index]) {
                    const member = topThree[index]
                    const rank = index + 1
                    
                    const div = document.createElement('div')
                    div.className = `podium-item rank-${rank}`
                    
                    const imgContainer = document.createElement('div')
                    imgContainer.className = 'image-container'
                    
                    const badge = document.createElement('div')
                    badge.className = 'rank-badge'
                    badge.textContent = rank
                    
                    const img = document.createElement('img')
                    img.src = getImageUrl(member.name)
                    img.onerror = handleImageError
                    
                    imgContainer.appendChild(badge)
                    imgContainer.appendChild(img)
                    
                    const label = document.createElement('div')
                    label.className = 'name-label'
                    label.textContent = `${member.name} (${member.meet_count}x)`
                    
                    div.appendChild(imgContainer)
                    div.appendChild(label)
                    podiumContainer.appendChild(div)
                }
            })
            
            rest.forEach((member, index) => {
                const rank = index + 4
                
                const div = document.createElement('div')
                div.className = 'list-item'
                
                const rankSpan = document.createElement('div')
                rankSpan.className = 'list-rank'
                rankSpan.textContent = `${rank}.`
                
                const img = document.createElement('img')
                img.src = getImageUrl(member.name)
                img.onerror = handleImageError
                
                const label = document.createElement('div')
                label.textContent = `${member.name} (${member.meet_count}x)`
                
                div.appendChild(rankSpan)
                div.appendChild(img)
                div.appendChild(label)
                listContainer.appendChild(div)
            })
        }

        loadData()
    </script>
</body>
</html>
